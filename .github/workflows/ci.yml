name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      UV_PYTHON: "3.10"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dependencies
        run: uv sync

      - name: pre-commit
        uses: pre-commit/action@v3.0.1

      - name: Test
        # Invoked via `coverage run` (not `pytest --cov`) so tracing starts at interpreter
        # startup: pytest's own config parsing eagerly imports the `filterwarnings` target
        # ("error::eagle.exceptions.UnusedRelatedAccess") before pytest-cov would attach,
        # which under `pytest --cov` silently drops that early import from measurement.
        run: uv run coverage run -m pytest -q

      - name: Coverage report
        run: uv run coverage report -m

      - name: Coverage XML
        run: uv run coverage xml

      - name: Generate coverage badge
        run: uv run genbadge coverage -i coverage.xml -o assets/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/coverage.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge"
          git push

      - name: Enforce minimum coverage
        run: uv run coverage report --fail-under=95
