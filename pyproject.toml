[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["eagle*"]

[project]
name = "django-eagle"
version = "0.1.0"
description = "Prevent Django ORM Unused Eager Loads"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "django>=5.2",
]

[dependency-groups]
dev = [
    "autopub>=0.4.1",
    "djangorestframework>=3.16.0",
    "factory-boy>=3.3.0",
    "pyrefly>=1.0.0",
    "pytest>=9.0.3",
    "pytest-cov>=5.0.0",
    "pytest-django>=4.9.0",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "test_project.settings"
python_files = ["test_*.py"]
pythonpath = ["."]

[tool.coverage.run]
branch = true
source = ["eagle"]

[tool.coverage.report]
show_missing = true
skip_covered = true

[tool.pyrefly]
project-includes = ["eagle"]
python-version = "3.13"

# eagle composes mixins onto Django's ORM descriptor classes at runtime and
# reads/writes attributes Django adds dynamically. A static checker cannot model
# that, so the categories driven by it are disabled; everything else is checked.
[tool.pyrefly.errors]
missing-attribute = false
bad-assignment = false
bad-argument-type = false
invalid-type-alias = false
bad-return = false
no-access = false
not-iterable = false

[tool.autopub]
project-name = "django-eagle"
git-username = "Cameron Hobbs"
git-email = "cameron.hobbs@xelix.com"
append-github-contributor = true

[tool.flake8]
select = ['MLL']

[tool.pydoclint]
style = 'sphinx'
arg-type-hints-in-docstring = false
check-arg-order = false
should-document-star-arguments = false
skip-checking-raises = true
check-return-types = false
check-yield-types = false
check-style-mismatch = true
